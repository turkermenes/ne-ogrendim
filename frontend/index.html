<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bugün Ne Öğrendim? - Gün içinde öğrendiğin bilgiyi paylaş. Günlük mikro-blog platformu.">
    <meta name="keywords" content="mikro-blog, günlük, öğrenme, bilgi paylaşımı, bugün ne öğrendim">
    <meta name="author" content="Günlük Team">
    <meta name="theme-color" content="#0a0a0f">
    <meta property="og:title" content="Bugün Ne Öğrendim? | Günlük Mikro-Blog">
    <meta property="og:description" content="Gün içinde öğrendiğin bilgiyi paylaş.">
    <meta property="og:type" content="website">
    <title>Bugün Ne Öğrendim? | Günlük Mikro-Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <header class="header">
            <h1 class="header__title">
                <span class="header__emoji">💡</span>
                Bugün Ne Öğrendim?
            </h1>
            <p class="header__subtitle">Gün içinde öğrendiğin bilgiyi paylaşır mısın????</p>
        </header>

        <main>
            <section class="create-post">
                <form id="postForm" class="post-form glass-card" autocomplete="off">
                    <div class="form-group">
                        <input
                            type="text"
                            id="authorInput"
                            class="form-input"
                            placeholder="Adın..."
                            maxlength="50"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <textarea
                            id="contentInput"
                            class="form-textarea"
                            placeholder="Bugün ne öğrendin?"
                            maxlength="140"
                            rows="3"
                            required
                        ></textarea>
                        <div class="char-counter">
                            <span id="charCount">140</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">Paylaş</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>
            </section>

            <section class="timeline-section">
                <div id="timeline" class="timeline"></div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Bugün Ne Öğrendim? — Tüm hakları saklıdır.</p>
        </footer>
    </div>

    <!-- Toast notification container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>

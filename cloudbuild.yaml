# ============================================================================
# Cloud Build Yapılandırması - Bugün Ne Öğrendim? (Günlük)
# ============================================================================
# Google Cloud Build CI/CD pipeline yapılandırması.
# Backend ve frontend imajlarını oluşturur, push eder ve GKE'ye dağıtır.
# ============================================================================

steps:
  # Backend imajını build et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend:latest', './backend']

  # Frontend imajını build et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend:latest', './frontend']

  # Backend imajını push et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend']

  # Frontend imajını push et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend']

  # K8s manifest'leri uygula
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/', '-n', 'gunluk']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
      - 'CLOUDSDK_CORE_PROJECT=${_GKE_PROJECT}'

  # Backend deployment'ı güncelle
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['set', 'image', 'deployment/gunluk-backend', 'gunluk-backend=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend:$SHORT_SHA', '-n', 'gunluk']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
      - 'CLOUDSDK_CORE_PROJECT=${_GKE_PROJECT}'

  # Frontend deployment'ı güncelle
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['set', 'image', 'deployment/gunluk-frontend', 'gunluk-frontend=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend:$SHORT_SHA', '-n', 'gunluk']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
      - 'CLOUDSDK_CORE_PROJECT=${_GKE_PROJECT}'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-backend:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/gunluk-frontend:latest'

substitutions:
  _REGION: europe-west1
  _REPO_NAME: gunluk-repo
  _CLUSTER_NAME: k8s-proje-cluster
  _ZONE: europe-west3-a
  _GKE_PROJECT: k8s-proje-38

options:
  logging: CLOUD_LOGGING_ONLY

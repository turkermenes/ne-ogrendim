# ============================================================
# Service: gunluk-frontend-service
# Frontend'e dış dünyadan erişim sağlayan LoadBalancer servisi.
# GKE'de otomatik olarak bir external IP atar.
# Local test için NodePort veya port-forward kullanılabilir.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: gunluk-frontend-service
  namespace: gunluk
  labels:
    app: gunluk
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: gunluk
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

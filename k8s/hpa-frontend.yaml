# ============================================================
# HorizontalPodAutoscaler: gunluk-frontend-hpa
# Frontend pod'larını CPU kullanımına göre otomatik ölçeklendirir.
# CPU kullanımı %50'yi aştığında yeni pod'lar oluşturulur.
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gunluk-frontend-hpa
  namespace: gunluk
  labels:
    app: gunluk
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gunluk-frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
